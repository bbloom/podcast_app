services:
  app:
    build: .
    container_name: news_rag_app
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./:/app
      - ./certs:/certs:ro
      - ./caddy:/etc/caddy/Caddyfile.d
      - caddy_data:/data
      - caddy_config:/config
    tty: true
    environment:
      - SERVER_NAME=disabled.local
      - CADDY_GLOBAL_OPTIONS=local_certs
      - APP_ENV=local
      - APP_DEBUG=true
      - DB_HOST=db
      - DB_DATABASE=news_rag
      - DB_USERNAME=bob_bloom
      - DB_PASSWORD=password123
      - XDEBUG_MODE=debug
      - XDEBUG_CONFIG=client_host=localhost client_port=9003
    sysctls:
      - net.ipv4.ip_unprivileged_port_start=0
    networks:
      - rag-network

  queue:
    build: .
    container_name: news_rag_queue
    restart: unless-stopped
    command: php /app/artisan queue:work --verbose --tries=3 --timeout=600
    volumes:
      - ./:/app
      - ./certs:/certs:ro
    tty: true
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
      - DB_HOST=db
      - DB_DATABASE=news_rag
      - DB_USERNAME=bob_bloom
      - DB_PASSWORD=password123
    depends_on:
      - db
    networks:
      - rag-network

  db:
    image: pgvector/pgvector:pg17
    container_name: news_db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: news_rag
      POSTGRES_USER: bob_bloom
      POSTGRES_PASSWORD: password123
    volumes:
      - /home/bob/Phpserverlessproject/postgres_data:/var/lib/postgresql/data
    networks:
      - rag-network

networks:
  rag-network:
    driver: bridge

volumes:
  caddy_data:
  caddy_config: